<svg width="900" height="1800" viewBox="0 0 900 1800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="paperGlow" cx="50%" cy="24%" r="78%">
      <stop offset="0" stop-color="#fff9ed" stop-opacity=".86"/>
      <stop offset=".48" stop-color="#e8ddc9" stop-opacity=".52"/>
      <stop offset="1" stop-color="#8d986f" stop-opacity=".42"/>
    </radialGradient>
    <radialGradient id="sageWash" cx="18%" cy="18%" r="82%">
      <stop offset="0" stop-color="#edf0da" stop-opacity=".24"/>
      <stop offset=".5" stop-color="#92a06c" stop-opacity=".18"/>
      <stop offset="1" stop-color="#2f412d" stop-opacity=".34"/>
    </radialGradient>
    <linearGradient id="leafDeep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22341f" stop-opacity=".72"/>
      <stop offset=".5" stop-color="#536540" stop-opacity=".62"/>
      <stop offset="1" stop-color="#b4b58f" stop-opacity=".36"/>
    </linearGradient>
    <linearGradient id="leafPale" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#425336" stop-opacity=".42"/>
      <stop offset=".52" stop-color="#a6ad83" stop-opacity=".3"/>
      <stop offset="1" stop-color="#f4ead8" stop-opacity=".22"/>
    </linearGradient>
    <filter id="soften" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <filter id="washBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".82" numOctaves="4" seed="12"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
    </filter>
    <path id="leaf" d="M0 0C34-22 68-19 100 8 62 27 28 24 0 0Z"/>
    <path id="smallLeaf" d="M0 0C24-16 48-13 68 7 39 19 17 17 0 0Z"/>
  </defs>

  <rect width="900" height="1800" fill="url(#paperGlow)"/>
  <rect width="900" height="1800" fill="#efe5d2" opacity=".38"/>
  <ellipse cx="70" cy="520" rx="280" ry="520" fill="#31442d" opacity=".18" filter="url(#washBlur)"/>
